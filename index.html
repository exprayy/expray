<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>expray</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* === เดิมทั้งหมดของคุณ === */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
color:#fff;
min-height:100dvh;
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;

padding-left:20px;
padding-right:20px;
padding-top:calc(env(safe-area-inset-top) + 20px);
padding-bottom:calc(env(safe-area-inset-bottom) + 20px);
}

/* VIDEO */

.bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.bg-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.45);
backdrop-filter:blur(10px);
z-index:-1;
}

/* ENTER */

.enter-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:800;
cursor:pointer;
z-index:10;
}

/* MAIN */

.main-ui{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
opacity:0;
pointer-events:none;
transition:opacity .6s;
}

.main-ui.show{
opacity:1;
pointer-events:auto;
}

/* CARD */

.container{
width:100%;
max-width:420px;
max-height:calc(100dvh - 60px);
overflow:auto;
padding:30px;
border-radius:25px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(35px);
border:1px solid rgba(255,255,255,.15);
box-shadow:0 10px 40px rgba(0,0,0,.6);
text-align:center;
transform-style:preserve-3d;
will-change:transform;
}

/* PROFILE */

.profile-img{
width:110px;
height:110px;
border-radius:50%;
background:url("Profile.jpg");
background-size:cover;
background-position:center;
margin:auto;
border:3px solid rgba(255,255,255,.3);
}

/* NAME */

.username{
font-size:34px;
font-weight:800;
margin-top:15px;
background:linear-gradient(90deg,white,#7df9ff,white);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:nameGlow 4s linear infinite;
}

@keyframes nameGlow{
0%{background-position:0%}
100%{background-position:200%}
}

/* BIO */

.bio{
font-size:14px;
opacity:.85;
margin-top:5px;
height:20px;
}

.cursor{animation:blink 1s infinite;}
@keyframes blink{50%{opacity:0}}

/* SOCIAL */

.social-icons{
margin-top:15px;
display:flex;
justify-content:center;
gap:25px;
font-size:22px;
}

.social-icons a{
color:white;
transition:transform .25s;
}

.social-icons a:hover{
transform:scale(1.25);
filter:drop-shadow(0 0 6px white) drop-shadow(0 0 12px white);
}

/* LINKS */

.link{
display:block;
margin-top:15px;
padding:15px;
border-radius:15px;
text-decoration:none;
color:white;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);
transition:transform .2s,background .2s;
}

.link:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.16);
}

/* DONATE */

.donate{
background:linear-gradient(45deg,#00ffd5,#00bfff);
color:black;
font-weight:700;
box-shadow:0 0 15px rgba(0,255,213,.6),0 0 40px rgba(0,191,255,.5);
animation:donatePulse 2.5s ease-in-out infinite;
}

@keyframes donatePulse{
0%{transform:scale(1)}
50%{transform:scale(1.04)}
100%{transform:scale(1)}
}

/* VOLUME BOX */

.volume-box{
position:fixed;
top:20px;
left:20px;
display:flex;
align-items:center;
gap:8px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
padding:10px 14px;
border-radius:25px;
box-shadow:0 5px 25px rgba(0,0,0,.6);
opacity:0;
transition:.3s;
}

.volume-box.show{opacity:1;}

#musicIcon{
font-size:20px;
cursor:pointer;
}

/* ==== NEW SLIDER ==== */

#volumeSlider{
width:0;
opacity:0;
transition:.25s;
appearance:none;
height:4px;
background:rgba(255,255,255,.8);
border-radius:10px;
cursor:pointer;
}

.volume-box:hover #volumeSlider{
width:90px;
opacity:1;
}

#volumeSlider::-webkit-slider-thumb{
appearance:none;
width:12px;
height:12px;
background:#00ffd5;
border-radius:50%;
box-shadow:0 0 8px #00ffd5;
}

</style>
</head>

<body>

<video autoplay muted loop playsinline class="bg-video">
<source src="Background2.mp4">
</video>

<div class="bg-overlay"></div>

<div class="enter-screen" id="enter">
Welcome kub eiei
</div>

<div class="main-ui" id="main">

<div class="container" id="card">

<div class="profile-img"></div>

<h1 class="username">expray</h1>

<div class="bio">
<span id="bioText"></span><span class="cursor">|</span>
</div>

<div class="social-icons">
<a href="#"><i class="fas fa-hand-holding-dollar"></i></a>
<a href="#"><i class="fab fa-twitch"></i></a>
<a href="#"><i class="fab fa-tiktok"></i></a>
<a href="#"><i class="fab fa-youtube"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fa-brands fa-x-twitter"></i></a>
</div>

<a class="link donate">💸 โดเนทขึ้นจอ</a>

<a class="link">Twitch</a>
<a class="link">TikTok</a>
<a class="link">YouTube</a>
<a class="link">Instagram</a>
<a class="link">X (Twitter)</a>

</div>

</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div class="volume-box" id="volumeBox">
<i id="musicIcon" class="fas fa-volume-up"></i>
<input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
</div>

<script>

/* === เดิม === */

const enter=document.getElementById("enter")
const main=document.getElementById("main")
const music=document.getElementById("music")
const volumeBox=document.getElementById("volumeBox")

enter.onclick=()=>{
music.muted=false
music.play()
enter.style.display="none"
main.classList.add("show")
volumeBox.classList.add("show")
}

/* volume icon */

const icon=document.getElementById("musicIcon")

icon.onclick=()=>{
music.muted=!music.muted
icon.className=music.muted?"fas fa-volume-mute":"fas fa-volume-up"
}

/* === NEW SLIDER === */

const slider=document.getElementById("volumeSlider")

slider.addEventListener("input",()=>{
music.volume=slider.value

if(slider.value==0){
icon.className="fas fa-volume-mute"
}else if(slider.value<0.5){
icon.className="fas fa-volume-down"
}else{
icon.className="fas fa-volume-up"
}
})

/* CARD 3D */

const card=document.getElementById("card")
let mouseX=0,mouseY=0

card.addEventListener("mousemove",(e)=>{
const rect=card.getBoundingClientRect()
mouseX=(e.clientX-rect.left)/rect.width-.5
mouseY=(e.clientY-rect.top)/rect.height-.5
})

function animate(){
card.style.transform=`rotateX(${mouseY*-10}deg) rotateY(${mouseX*10}deg)`
requestAnimationFrame(animate)
}
animate()

/* BIO */

const texts=[
"สวัสดีครับผมชื่อ ซัน ☀️",
"Thanks for your support kub ❤️"
]

let i=0,j=0,del=false
const bio=document.getElementById("bioText")

function type(){
let t=texts[i]

if(!del){
bio.textContent=t.substring(0,j++)
if(j>t.length){del=true;setTimeout(type,2000);return}
}else{
bio.textContent=t.substring(0,j--)
if(j==0){del=false;i=(i+1)%texts.length}
}

setTimeout(type,del?40:70)
}
type()

</script>

</body>
</html>
