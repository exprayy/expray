<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>expray</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* VIDEO */

.bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.bg-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
backdrop-filter:blur(12px);
z-index:-1;
}

/* ENTER */

.enter-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:42px;
font-weight:800;
cursor:pointer;
z-index:10;

background:linear-gradient(135deg,#00ffd5,#00bfff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* MAIN */

.main-ui{
opacity:0;
pointer-events:none;
transition:.6s;
}

.main-ui.show{
opacity:1;
pointer-events:auto;
}

/* CARD */

.container{
width:380px;
padding:30px;
border-radius:25px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 10px 40px rgba(0,0,0,.6),
inset 0 0 30px rgba(255,255,255,.05);

text-align:center;
transition:.3s;
}

/* PROFILE */

.profile-img{
width:110px;
height:110px;
border-radius:50%;
background:url("Profile.jpg") center/cover;

margin:auto;

border:3px solid rgba(255,255,255,.4);

box-shadow:0 0 20px rgba(0,255,213,.6);
}

/* NAME */

.username{
font-size:34px;
font-weight:800;
margin-top:15px;

background:linear-gradient(90deg,#fff,#00ffd5,#fff);
background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:glow 4s linear infinite;
}

@keyframes glow{
0%{background-position:0%}
100%{background-position:200%}
}

/* BIO */

.bio{
font-size:14px;
opacity:.8;
margin-top:5px;
height:20px;
}

/* SOCIAL */

.social-icons{
margin-top:15px;
display:flex;
justify-content:center;
gap:20px;
font-size:22px;
}

.social-icons a{
color:white;
transition:.3s;
}

.social-icons a:hover{
transform:scale(1.3);
color:#00ffd5;
}

/* LINKS */

.link{
display:block;
margin-top:15px;
padding:15px;
border-radius:15px;

background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);

transition:.25s;
}

.link:hover{
transform:translateY(-4px) scale(1.02);
background:rgba(255,255,255,.18);
box-shadow:0 0 15px rgba(0,255,213,.4);
}

/* DONATE */

.donate{
background:linear-gradient(45deg,#00ffd5,#00bfff);
color:#000;
font-weight:700;

box-shadow:0 0 25px rgba(0,255,213,.6);
}

/* VOLUME */

.volume-box{
position:fixed;
top:20px;
left:20px;

display:flex;
align-items:center;
gap:10px;

background:rgba(255,255,255,.1);
backdrop-filter:blur(20px);

padding:10px 14px;
border-radius:25px;

box-shadow:0 5px 25px rgba(0,0,0,.6);

transition:.3s;
}

#musicIcon{
font-size:18px;
cursor:pointer;
}

/* SLIDER */

#volumeSlider{
width:0;
opacity:0;
transition:.3s;

appearance:none;
height:4px;
background:white;
border-radius:10px;
cursor:pointer;
}

.volume-box:hover #volumeSlider{
width:100px;
opacity:1;
}

#volumeSlider::-webkit-slider-thumb{
appearance:none;
width:12px;
height:12px;
background:#00ffd5;
border-radius:50%;
}

/* CURSOR */

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0}
}

</style>
</head>

<body>

<video autoplay muted loop class="bg-video">
<source src="Background2.mp4">
</video>

<div class="bg-overlay"></div>

<div class="enter-screen" id="enter">
Click to Enter
</div>

<div class="main-ui" id="main">

<div class="container" id="card">

<div class="profile-img"></div>

<h1 class="username">expray</h1>

<div class="bio">
<span id="bioText"></span><span class="cursor">|</span>
</div>

<div class="social-icons">
<a href="#"><i class="fab fa-twitch"></i></a>
<a href="#"><i class="fab fa-tiktok"></i></a>
<a href="#"><i class="fab fa-youtube"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
</div>

<a class="link donate">💸 Donate</a>

<a class="link">Twitch</a>
<a class="link">TikTok</a>
<a class="link">YouTube</a>
<a class="link">Instagram</a>

</div>

</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div class="volume-box">
<i id="musicIcon" class="fas fa-volume-up"></i>
<input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
</div>

<script>

const enter=document.getElementById("enter")
const main=document.getElementById("main")
const music=document.getElementById("music")
const icon=document.getElementById("musicIcon")
const slider=document.getElementById("volumeSlider")

enter.onclick=()=>{
music.muted=false
music.play()
enter.style.display="none"
main.classList.add("show")
}

/* volume slider */

slider.addEventListener("input",()=>{
music.volume=slider.value

if(slider.value==0){
icon.className="fas fa-volume-mute"
}else{
icon.className="fas fa-volume-up"
}
})

/* icon click mute */

icon.onclick=()=>{
music.muted=!music.muted

icon.className=music.muted
? "fas fa-volume-mute"
: "fas fa-volume-up"
}

/* typing */

const texts=[
"สวัสดีครับผมชื่อ ซัน ☀️",
"Thanks for your support ❤️"
]

let i=0,j=0,del=false
const bio=document.getElementById("bioText")

function type(){
let t=texts[i]

if(!del){
bio.textContent=t.substring(0,j++)
if(j>t.length){del=true;setTimeout(type,1500);return}
}else{
bio.textContent=t.substring(0,j--)
if(j==0){del=false;i=(i+1)%texts.length}
}

setTimeout(type,del?40:70)
}

type()

</script>

</body>
</html>
