<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>expray</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#000;color:#fff;
min-height:100dvh;
display:flex;justify-content:center;align-items:center;
padding:20px;
overflow-x:hidden;
}

/* VIDEO */
.bg-video{
position:fixed;inset:0;
width:100%;height:100%;
object-fit:cover;
z-index:-2;
}
.bg-overlay{
position:fixed;inset:0;
background:rgba(0,0,0,.5);
backdrop-filter:blur(12px);
z-index:-1;
}

/* ENTER */
.enter-screen{
position:fixed;inset:0;
display:flex;justify-content:center;align-items:center;
font-size:36px;font-weight:800;
cursor:pointer;z-index:10;
}

/* MAIN */
.main-ui{
opacity:0;
pointer-events:none;
transition:.6s;
}
.main-ui.show{
opacity:1;
pointer-events:auto;
}

/* CARD */
.container{
width:100%;
max-width:480px;
padding:32px 28px;
border-radius:28px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 20px 60px rgba(0,0,0,.6),
inset 0 0 20px rgba(255,255,255,.05);

text-align:center;

transform-style:preserve-3d;
will-change:transform;
}

/* PROFILE */
.profile-img{
width:110px;height:110px;
border-radius:50%;
background:url("Profile.jpg") center/cover;
margin:auto;
}

/* NAME */
.username{
font-size:34px;
font-weight:800;
margin-top:12px;

background:linear-gradient(90deg,white,#7df9ff,white);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:nameGlow 4s linear infinite;
}
@keyframes nameGlow{100%{background-position:200%}}

/* BIO */
.bio{
font-size:14px;
opacity:.85;
min-height:22px;
line-height:1.5;
margin-top:4px;
}

/* SOCIAL */
.social-icons{
display:flex;
justify-content:center;
gap:24px;
font-size:21px;
margin-top:12px;
}
.social-icons a{
color:white;
transition:.2s;
}
.social-icons a:hover{
transform:scale(1.2);
}

/* LINKS */
.link{
display:block;
margin-top:14px;
padding:15px;
border-radius:16px;
text-decoration:none;
color:white;

background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);

transition:.2s;
}
.link:hover{
transform:translateY(-4px);
background:rgba(255,255,255,.18);
}

/* DONATE */
.donate{
background:linear-gradient(45deg,#00ffd5,#00bfff);
color:#000;
font-weight:700;
box-shadow:0 0 25px rgba(0,255,213,.5);
}

/* VOLUME */
.volume-box{
position:fixed;
top:20px;left:20px;
display:flex;
align-items:center;
gap:8px;

background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);

padding:10px 14px;
border-radius:25px;

opacity:0;
transition:.3s;
}
.volume-box.show{opacity:1;}

#musicIcon{font-size:20px;cursor:pointer;}

/* SLIDER */
#volumeSlider{
width:0;
opacity:0;
transition:.25s;
}

/* PC ONLY */
@media (hover:hover) and (pointer:fine){
.volume-box:hover #volumeSlider{
width:110px;
opacity:1;
}
}

/* MOBILE */
@media (hover:none){
#volumeSlider{display:none;}
}

/* DESKTOP BOOST */
@media (min-width:1024px){

.container{
max-width:520px;
padding:36px 32px;
}

.username{font-size:36px;}

.link{
padding:16px;
font-size:15px;
}

.social-icons{
gap:28px;
font-size:22px;
}

}

</style>
</head>

<body>

<video autoplay muted loop class="bg-video">
<source src="Background2.mp4">
</video>

<div class="bg-overlay"></div>

<div class="enter-screen" id="enter">
Welcome kub eiei
</div>

<div class="main-ui" id="main">

<div class="container" id="card">

<div class="profile-img"></div>

<h1 class="username">expray</h1>

<div class="bio">
<span id="bioText"></span>
</div>

<div class="social-icons">
<a href="https://easydonate.app/expray_" target="_blank"><i class="fas fa-hand-holding-dollar"></i></a>
<a href="https://www.twitch.tv/expray_" target="_blank"><i class="fab fa-twitch"></i></a>
<a href="https://www.tiktok.com/@expray23" target="_blank"><i class="fab fa-tiktok"></i></a>
<a href="https://www.youtube.com/@exprayy" target="_blank"><i class="fab fa-youtube"></i></a>
<a href="https://www.instagram.com/chxyoii_" target="_blank"><i class="fab fa-instagram"></i></a>
<a href="https://discord.gg/DmZM4JKJS4" target="_blank"><i class="fab fa-discord"></i></a>
<a href="https://x.com/expray_" target="_blank"><i class="fa-brands fa-x-twitter"></i></a>
</div>

<a class="link donate" href="https://easydonate.app/expray_" target="_blank">💸 โดเนทขึ้นจอ</a>

<a class="link" href="https://www.twitch.tv/expray_" target="_blank">Twitch</a>
<a class="link" href="https://www.tiktok.com/@expray23" target="_blank">TikTok</a>
<a class="link" href="https://www.youtube.com/@exprayy" target="_blank">YouTube</a>
<a class="link" href="https://www.instagram.com/chxyoii_" target="_blank">Instagram</a>
<a class="link" href="https://discord.gg/DmZM4JKJS4" target="_blank">Discord</a>
<a class="link" href="https://x.com/expray_" target="_blank">X (Twitter)</a>

</div>

</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div class="volume-box" id="volumeBox">
<i id="musicIcon" class="fas fa-volume-up"></i>
<input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
</div>

<script>

const enter=document.getElementById("enter")
const main=document.getElementById("main")
const music=document.getElementById("music")
const volumeBox=document.getElementById("volumeBox")

enter.onclick=()=>{
music.muted=false
music.play().catch(()=>{})
enter.style.display="none"
main.classList.add("show")
volumeBox.classList.add("show")
}

/* VOLUME */
const icon=document.getElementById("musicIcon")
const slider=document.getElementById("volumeSlider")

music.volume = slider.value

icon.onclick=()=>{
music.muted=!music.muted
icon.className=music.muted?"fas fa-volume-mute":"fas fa-volume-up"
}

slider.addEventListener("input",()=>{
music.muted=false
music.volume=parseFloat(slider.value)
})

/* CARD 3D (PC ONLY) */
const card=document.getElementById("card")

if(window.matchMedia("(hover: hover)").matches){
let mouseX=0,mouseY=0

card.addEventListener("mousemove",(e)=>{
const rect=card.getBoundingClientRect()
mouseX=(e.clientX-rect.left)/rect.width-.5
mouseY=(e.clientY-rect.top)/rect.height-.5
})

function animate(){
card.style.transform=`rotateX(${mouseY*-10}deg) rotateY(${mouseX*10}deg)`
requestAnimationFrame(animate)
}
animate()
}

/* BIO */
const texts=[
"สวัสดีครับผมชื่อ ซัน ☀️",
"Thanks for your support kub jubjub❤️"
]

let i=0,j=0,del=false
const bio=document.getElementById("bioText")

function type(){
let t=texts[i]

if(!del){
bio.textContent=t.substring(0,j++)
if(j>t.length){del=true;setTimeout(type,1500);return}
}else{
bio.textContent=t.substring(0,j--)
if(j==0){del=false;i=(i+1)%texts.length}
}

setTimeout(type,del?40:70)
}
type()

</script>

</body>
</html>
