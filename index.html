<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>expray</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
color:#fff;
min-height:100dvh;
display:flex;
justify-content:center;
align-items:center;
overflow-x:hidden;

padding:20px;
}

/* VIDEO */

.bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.bg-overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
backdrop-filter:blur(12px);
z-index:-1;
}

/* ENTER */

.enter-screen{
position:fixed;
inset:0;
display:flex;
justify-content:center;
align-items:center;
font-size:36px;
font-weight:800;
cursor:pointer;
z-index:10;
}

/* MAIN */

.main-ui{
width:100%;
display:flex;
justify-content:center;
opacity:0;
pointer-events:none;
transition:.6s;
}

.main-ui.show{
opacity:1;
pointer-events:auto;
}

/* CARD */

.container{
width:100%;
max-width:420px;

padding:28px 24px;

border-radius:25px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.15);

box-shadow:0 15px 50px rgba(0,0,0,.6);

text-align:center;

display:flex;
flex-direction:column;
gap:12px;
}

/* PROFILE */

.profile-img{
width:100px;
height:100px;
border-radius:50%;
background:url("Profile.jpg") center/cover;
margin:auto;
}

/* NAME */

.username{
font-size:32px;
font-weight:800;
background:linear-gradient(90deg,white,#7df9ff,white);
background-size:200%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:nameGlow 4s linear infinite;
}

@keyframes nameGlow{
100%{background-position:200%}
}

/* BIO FIX */

.bio{
font-size:14px;
opacity:.85;
min-height:22px;
line-height:1.5;
}

/* SOCIAL */

.social-icons{
display:flex;
justify-content:center;
gap:22px;
font-size:20px;
margin-top:5px;
}

/* LINKS */

.link{
display:block;
padding:14px;
border-radius:14px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);
transition:.2s;
}

.link:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.18);
}

/* DONATE */

.donate{
background:linear-gradient(45deg,#00ffd5,#00bfff);
color:#000;
font-weight:700;
box-shadow:0 0 20px rgba(0,255,213,.5);
}

/* VOLUME */

.volume-box{
position:fixed;
top:20px;
left:20px;
display:flex;
align-items:center;
gap:8px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
padding:10px 14px;
border-radius:25px;
opacity:0;
transition:.3s;
}

.volume-box.show{opacity:1;}

#volumeSlider{
width:0;
opacity:0;
transition:.25s;
}

/* PC */
@media (hover:hover){
.volume-box:hover #volumeSlider{
width:100px;
opacity:1;
}
}

/* MOBILE */
@media (hover:none){
#volumeSlider{display:none;}
}

/* MOBILE FIX LAYOUT */

@media (max-width:500px){

.container{
padding:24px 18px;
gap:10px;
}

.profile-img{
width:90px;
height:90px;
}

.username{
font-size:28px;
}

.link{
padding:12px;
}

}

</style>
</head>

<body>

<video autoplay muted loop class="bg-video">
<source src="Background2.mp4">
</video>

<div class="bg-overlay"></div>

<div class="enter-screen" id="enter">
Welcome kub eiei
</div>

<div class="main-ui" id="main">

<div class="container">

<div class="profile-img"></div>

<h1 class="username">expray</h1>

<div class="bio">
<span id="bioText"></span>
</div>

<div class="social-icons">
<i class="fas fa-hand-holding-dollar"></i>
<i class="fab fa-twitch"></i>
<i class="fab fa-tiktok"></i>
<i class="fab fa-youtube"></i>
<i class="fab fa-instagram"></i>
<i class="fab fa-discord"></i>
<i class="fa-brands fa-x-twitter"></i>
</div>

<a class="link donate">💸 โดเนทขึ้นจอ</a>
<a class="link">Twitch</a>
<a class="link">TikTok</a>
<a class="link">YouTube</a>
<a class="link">Instagram</a>
<a class="link">Discord</a>
<a class="link">X (Twitter)</a>

</div>

</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<div class="volume-box" id="volumeBox">
<i id="musicIcon" class="fas fa-volume-up"></i>
<input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="1">
</div>

<script>

const enter=document.getElementById("enter")
const main=document.getElementById("main")
const music=document.getElementById("music")
const volumeBox=document.getElementById("volumeBox")

enter.onclick=()=>{
music.play().catch(()=>{})
enter.style.display="none"
main.classList.add("show")
volumeBox.classList.add("show")
}

/* BIO FIX */

const texts=[
"สวัสดีครับผมชื่อ ซัน ☀️",
"Thanks for your support ❤️"
]

let i=0,j=0,del=false
const bio=document.getElementById("bioText")

function type(){
let t=texts[i]

if(!del){
bio.textContent=t.substring(0,j++)
if(j>t.length){del=true;setTimeout(type,1500);return}
}else{
bio.textContent=t.substring(0,j--)
if(j==0){del=false;i=(i+1)%texts.length}
}

setTimeout(type,del?40:70)
}

type()

</script>

</body>
</html>
