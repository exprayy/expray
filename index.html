<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>expray</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

/* RESET */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
overflow:hidden;
color:white;
height:100vh;
}

/* PAGE LOAD */

body.loading{
filter:blur(15px);
opacity:0;
transform:scale(1.03);
transition:1.2s cubic-bezier(.2,.8,.2,1);
}

body.loaded{
filter:blur(0);
opacity:1;
transform:scale(1);
}

/* VIDEO */

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:brightness(.7);
}

.bg-overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
backdrop-filter:blur(10px);
z-index:-1;
}

/* ENTER */

.enter-screen{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
font-size:44px;
font-weight:800;
cursor:pointer;
background:rgba(0,0,0,.65);
transition:1s;
z-index:5;
}

.enter-screen.hidden{
opacity:0;
pointer-events:none;
}

/* MAIN */

.main-ui{
opacity:0;
transform:scale(.9);
transition:1.1s cubic-bezier(.2,.8,.2,1);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.main-ui.show{
opacity:1;
transform:scale(1);
}

/* CARD */

.container{

width:90%;
max-width:420px;
padding:30px;

border-radius:25px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.15);

box-shadow:
0 10px 40px rgba(0,0,0,.6),
0 0 30px rgba(255,255,255,.04);

text-align:center;

transition:.2s ease;
transform-style:preserve-3d;

}

/* PROFILE */

.profile-img{

width:110px;
height:110px;

border-radius:50%;

background:url("Profile.jpg");
background-size:cover;
background-position:center;

margin:auto;

border:3px solid rgba(255,255,255,.3);

box-shadow:0 0 20px rgba(255,255,255,.25);

}

/* TEXT */

h1{
margin-top:15px;
font-weight:800;
}

.bio{
font-size:14px;
opacity:.8;
margin-top:5px;
height:20px;
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0}
}

/* EMOJI BOUNCE */

.emoji{
display:inline-block;
animation:bounce 1.2s infinite;
}

@keyframes bounce{

0%,100%{transform:translateY(0)}
50%{transform:translateY(-4px)}

}

/* SOCIAL */

.social-icons{

margin-top:15px;

display:flex;
justify-content:center;
gap:25px;

font-size:22px;

}

.social-icons a{
color:white;
transition:.25s;
}

.social-icons a:hover{
transform:translateY(-3px) scale(1.2);
filter:drop-shadow(0 0 8px white);
}

/* LINKS */

.link{

display:block;

margin-top:15px;
padding:15px;

border-radius:15px;

text-decoration:none;

color:white;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.1);

transition:.3s;

}

.link:hover{

transform:translateY(-3px);

background:rgba(255,255,255,.16);

box-shadow:0 5px 25px rgba(255,255,255,.15);

}

.donate{

background:linear-gradient(45deg,#00ffd5,#00bfff);

color:black;
font-weight:600;

}

/* VOLUME */

.volume-box{

position:fixed;
top:20px;
left:20px;

display:flex;
align-items:center;

gap:10px;

background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);

padding:10px;

border-radius:20px;

box-shadow:0 5px 25px rgba(0,0,0,.6);

opacity:0;
pointer-events:none;

transition:.3s;

}

.volume-box.active{

opacity:1;
pointer-events:auto;

}

#musicIcon{

font-size:20px;
cursor:pointer;
transition:.25s;

}

#musicIcon:hover{
transform:scale(1.15);
}

.volume-slider{

width:0;
opacity:0;

transition:.35s cubic-bezier(.2,.8,.2,1);

appearance:none;

height:4px;

border-radius:10px;

background:linear-gradient(to right,white 100%,rgba(255,255,255,.25) 100%);

}

.volume-box:hover .volume-slider{

width:120px;
opacity:1;

}

.volume-slider::-webkit-slider-thumb{
appearance:none;
width:0;
height:0;
}

/* MOBILE */

@media(max-width:768px){

.volume-slider{
display:none;
}

}

</style>

</head>

<body class="loading">

<!-- VIDEO -->

<video autoplay muted loop class="bg-video">
<source src="Background2.mp4" type="video/mp4">
</video>

<div class="bg-overlay"></div>

<!-- ENTER -->

<div class="enter-screen" id="enter">
Welcome kub eiei
</div>

<!-- MAIN -->

<div class="main-ui" id="main">

<div class="container" id="card">

<div class="profile-img"></div>

<h1>expray</h1>

<div class="bio">
<span id="bioText"></span><span class="cursor">|</span>
</div>

<div class="social-icons">

<a href="https://tipme.in.th/expray"><i class="fas fa-hand-holding-dollar"></i></a>
<a href="https://www.twitch.tv/expray_"><i class="fab fa-twitch"></i></a>
<a href="https://www.tiktok.com/@expray23"><i class="fab fa-tiktok"></i></a>
<a href="https://www.youtube.com/@exprayy"><i class="fab fa-youtube"></i></a>
<a href="https://www.instagram.com/chxyoii_"><i class="fab fa-instagram"></i></a>
<a href="https://x.com/expray_"><i class="fa-brands fa-x-twitter"></i></a>

</div>

<a class="link donate" href="https://tipme.in.th/expray">💸 โดเนทขึ้นจอ</a>
<a class="link" href="https://www.twitch.tv/expray_">Twitch</a>
<a class="link" href="https://www.tiktok.com/@expray23">TikTok</a>
<a class="link" href="https://www.youtube.com/@exprayy">YouTube</a>
<a class="link" href="https://www.instagram.com/chxyoii_">Instagram</a>
<a class="link" href="https://x.com/expray_">X (Twitter)</a>

</div>

</div>

<!-- AUDIO -->

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<!-- VOLUME -->

<div class="volume-box" id="volumeBox">

<i id="musicIcon" class="fas fa-volume-up"></i>

<input
type="range"
min="0"
max="1"
step="0.01"
value="1"
class="volume-slider"
id="volumeSlider"
>

</div>

<script>

/* PAGE LOAD */

window.onload = ()=>{
document.body.classList.remove("loading")
document.body.classList.add("loaded")
}

/* ENTER */

const enter=document.getElementById("enter")
const main=document.getElementById("main")

const music=document.getElementById("music")

enter.onclick=()=>{

music.play()

enter.classList.add("hidden")

setTimeout(()=>{
main.classList.add("show")
volumeBox.classList.add("active")
},500)

}

/* VOLUME */

const icon=document.getElementById("musicIcon")
const slider=document.getElementById("volumeSlider")
const volumeBox=document.getElementById("volumeBox")

function updateSlider(){

const value=slider.value*100

slider.style.background=`linear-gradient(
to right,
white ${value}%,
rgba(255,255,255,.25) ${value}%
)`

}

slider.addEventListener("input",()=>{

music.volume=slider.value

updateSlider()

if(slider.value==0){
icon.className="fas fa-volume-mute"
}else{
icon.className="fas fa-volume-up"
}

})

icon.onclick=()=>{

if(music.volume>0){

music.volume=0
slider.value=0
icon.className="fas fa-volume-mute"

}else{

music.volume=1
slider.value=1
icon.className="fas fa-volume-up"

}

updateSlider()

}

updateSlider()

/* BIO TYPING */

const texts=[

'สวัสดีครับผมชื่อ ซัน<span class="emoji">☀️</span>',
'ขอบคุณทุกคนที่สนับสนุนครับ<span class="emoji">❤️</span>'

]

let textIndex=0
let charIndex=0
let deleting=false

const bio=document.getElementById("bioText")

function type(){

let current=texts[textIndex]

if(!deleting){

bio.innerHTML=current.substring(0,charIndex)

charIndex++

if(charIndex>current.length){

deleting=true
setTimeout(type,2000)
return

}

}else{

bio.innerHTML=current.substring(0,charIndex)

charIndex--

if(charIndex==0){

deleting=false
textIndex=(textIndex+1)%texts.length

}

}

setTimeout(type,deleting?40:70)

}

type()

/* PARALLAX CARD */

const card=document.getElementById("card")

document.addEventListener("mousemove",(e)=>{

const x=(window.innerWidth/2-e.clientX)/40
const y=(window.innerHeight/2-e.clientY)/40

card.style.transform=`
rotateY(${x}deg)
rotateX(${y}deg)
`

})

document.addEventListener("mouseleave",()=>{

card.style.transform="rotateY(0) rotateX(0)"

})

</script>

</body>
</html>
