<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>expray</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#000;
color:white;
overflow:hidden;
height:100vh;
}

/* VIDEO BACKGROUND */

.bg-video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.bg-overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,.45);
backdrop-filter:blur(12px);
z-index:-1;
}

/* WELCOME */

.enter-screen{

position:fixed;
width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;

font-size:42px;
font-weight:800;

cursor:pointer;

z-index:10;

}

/* MAIN */

.main-ui{

position:fixed;
width:100%;
height:100%;

display:flex;
justify-content:center;
align-items:center;

opacity:0;
pointer-events:none;

transition:1s;

}

.main-ui.show{
opacity:1;
pointer-events:auto;
}

/* CARD */

.container{

width:90%;
max-width:420px;

padding:30px;

border-radius:25px;

background:rgba(255,255,255,.06);
backdrop-filter:blur(35px);

border:1px solid rgba(255,255,255,.15);

box-shadow:0 10px 40px rgba(0,0,0,.6);

text-align:center;

transition:transform .2s;

}

/* MOBILE FLOAT */

@media(max-width:768px){

.container{
animation:float 4s ease-in-out infinite;
}

}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}

}

/* PROFILE */

.profile-img{

width:110px;
height:110px;

border-radius:50%;

background:url("Profile.jpg");
background-size:cover;
background-position:center;

margin:auto;

border:3px solid rgba(255,255,255,.3);

}

/* USERNAME */

.username{

font-size:34px;
font-weight:800;

margin-top:15px;

background:linear-gradient(
90deg,
white,
#7df9ff,
white
);

background-size:200%;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:nameGlow 3s linear infinite;

}

@keyframes nameGlow{

0%{background-position:0%}
100%{background-position:200%}

}

/* BIO */

.bio{
font-size:14px;
opacity:.8;
margin-top:5px;
height:20px;
}

.cursor{
animation:blink 1s infinite;
}

@keyframes blink{
50%{opacity:0}
}

/* SOCIAL ICONS */

.social-icons{

margin-top:15px;
display:flex;
justify-content:center;
gap:25px;
font-size:22px;

}

.social-icons a{

color:white;
display:inline-block;
transition:.25s;

}

.social-icons a:hover{

transform:scale(1.25) translateY(-3px);

filter:
drop-shadow(0 0 6px white)
drop-shadow(0 0 12px white);

}

/* LINKS */

.link{

display:block;
margin-top:15px;
padding:15px;

border-radius:15px;

text-decoration:none;
color:white;

background:rgba(255,255,255,.08);

border:1px solid rgba(255,255,255,.1);

transition:.3s;

}

.link:hover{

transform:translateY(-3px);
background:rgba(255,255,255,.16);

}

/* DONATE BAIT BUTTON */

.donate{

position:relative;

background:linear-gradient(45deg,#00ffd5,#00bfff);

color:black;
font-weight:700;

overflow:hidden;

animation:donatePulse 2.2s infinite;

box-shadow:
0 0 15px rgba(0,255,213,.6),
0 0 40px rgba(0,191,255,.5);

}

@keyframes donatePulse{

0%{transform:scale(1)}

50%{transform:scale(1.05)}

100%{transform:scale(1)}

}

.donate::before{

content:"";

position:absolute;

width:200%;
height:100%;

top:0;
left:-120%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,.8),
transparent
);

animation:shine 3s infinite;

}

@keyframes shine{
0%{left:-120%}
100%{left:120%}
}

.donate:hover{

transform:scale(1.08);

box-shadow:
0 0 30px rgba(0,255,213,1),
0 0 70px rgba(0,191,255,1);

}

.donate:active{
transform:scale(.96);
}

/* VOLUME PANEL */

.volume-box{

position:fixed;
top:20px;
left:20px;

display:flex;
align-items:center;
gap:10px;

background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);

padding:10px 14px;
border-radius:25px;

box-shadow:0 5px 25px rgba(0,0,0,.6);

opacity:0;
transition:.3s;

}

.volume-box.show{
opacity:1;
}

#musicIcon{
font-size:20px;
cursor:pointer;
}

/* SLIDER */

.volume-slider{

width:0;
opacity:0;

height:4px;
border-radius:10px;

appearance:none;

background:linear-gradient(
to right,
white 100%,
rgba(255,255,255,.25) 100%
);

transition:.3s;

}

.volume-box:hover .volume-slider{

width:120px;
opacity:1;

}

/* REMOVE KNOB */

.volume-slider::-webkit-slider-thumb{
appearance:none;
width:0;
height:0;
}

.volume-slider::-moz-range-thumb{
width:0;
height:0;
border:none;
}

/* MOBILE */

@media(max-width:768px){

.volume-slider{
display:none;
}

}

</style>
</head>

<body>

<video autoplay muted loop class="bg-video">
<source src="Background2.mp4" type="video/mp4">
</video>

<div class="bg-overlay"></div>

<div class="enter-screen" id="enter">
Welcome kub eiei
</div>

<div class="main-ui" id="main">

<div class="container" id="card">

<div class="profile-img"></div>

<h1 class="username">expray</h1>

<div class="bio">
<span id="bioText"></span><span class="cursor">|</span>
</div>

<div class="social-icons">

<a href="https://tipme.in.th/expray"><i class="fas fa-hand-holding-dollar"></i></a>
<a href="https://www.twitch.tv/expray_"><i class="fab fa-twitch"></i></a>
<a href="https://www.tiktok.com/@expray23"><i class="fab fa-tiktok"></i></a>
<a href="https://www.youtube.com/@exprayy"><i class="fab fa-youtube"></i></a>
<a href="https://www.instagram.com/chxyoii_"><i class="fab fa-instagram"></i></a>
<a href="https://x.com/expray_"><i class="fa-brands fa-x-twitter"></i></a>

</div>

<a class="link donate" href="https://tipme.in.th/expray">💸 โดเนทขึ้นจอ</a>

<a class="link" href="https://www.twitch.tv/expray_">Twitch</a>
<a class="link" href="https://www.tiktok.com/@expray23">TikTok</a>
<a class="link" href="https://www.youtube.com/@exprayy">YouTube</a>
<a class="link" href="https://www.instagram.com/chxyoii_">Instagram</a>
<a class="link" href="https://x.com/expray_">X (Twitter)</a>

</div>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<div class="volume-box" id="volumeBox">

<i id="musicIcon" class="fas fa-volume-up"></i>

<input
type="range"
min="0"
max="1"
step="0.01"
value="1"
class="volume-slider"
id="volumeSlider"
>

</div>

<script>

/* ENTER */

const enter=document.getElementById("enter")
const main=document.getElementById("main")
const music=document.getElementById("music")
const volumeBox=document.getElementById("volumeBox")

enter.onclick=()=>{

music.play()

enter.style.display="none"

main.classList.add("show")
volumeBox.classList.add("show")

}

/* VOLUME */

const icon=document.getElementById("musicIcon")
const slider=document.getElementById("volumeSlider")

function updateSlider(){

const value=slider.value*100

slider.style.background=
`linear-gradient(to right, white ${value}%, rgba(255,255,255,.25) ${value}%)`

}

slider.addEventListener("input",()=>{

music.volume=slider.value
updateSlider()

})

icon.onclick=()=>{

if(music.volume>0){

music.volume=0
slider.value=0
icon.className="fas fa-volume-mute"

}else{

music.volume=1
slider.value=1
icon.className="fas fa-volume-up"

}

updateSlider()

}

updateSlider()

/* CARD 3D */

const card=document.getElementById("card")

card.addEventListener("mousemove",(e)=>{

const rect=card.getBoundingClientRect()

const x=e.clientX-rect.left
const y=e.clientY-rect.top

const centerX=rect.width/2
const centerY=rect.height/2

const rotateX=(y-centerY)/12
const rotateY=(centerX-x)/12

card.style.transform=
`rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`

})

card.addEventListener("mouseleave",()=>{

card.style.transform="rotateX(0) rotateY(0) scale(1)"

})

/* BIO TYPING */

const texts=[
"สวัสดีครับผมชื่อ ซัน ☀️",
"Thanks for all your support kub ❤️"
]

let textIndex=0
let charIndex=0
let deleting=false

const bio=document.getElementById("bioText")

function type(){

let current=texts[textIndex]

if(!deleting){

bio.textContent=current.substring(0,charIndex)
charIndex++

if(charIndex>current.length){

deleting=true
setTimeout(type,2000)
return

}

}else{

bio.textContent=current.substring(0,charIndex)
charIndex--

if(charIndex==0){

deleting=false
textIndex=(textIndex+1)%texts.length

}

}

setTimeout(type,deleting?40:70)

}

type()

</script>

</body>
</html>
